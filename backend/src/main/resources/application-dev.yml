# Dev profile: PostgreSQL, validate schema.
# Start DB: docker compose up -d  (from repo root; set POSTGRES_PASSWORD in .env)
# Run app: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# Set SPRING_DATASOURCE_PASSWORD and ADMIN_PASSWORD in backend/.env (see .env.example)
spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

admin:
  auth:
    plainPassword: ${ADMIN_PASSWORD}

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.orbitos: DEBUG
