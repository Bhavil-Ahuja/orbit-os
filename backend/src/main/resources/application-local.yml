# Run without PostgreSQL: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
spring:
  datasource:
    url: jdbc:h2:mem:portfolio;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    database-platform: com.orbitos.portfolio.config.H2TextDialect
