# Default: PostgreSQL. To run without DB use: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
spring:
  application:
    name: portfolio

  datasource:
    # When DATABASE_URL is set (e.g. in .env or Railway), DatabaseUrlInitializer parses it and overrides url/username/password.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

# Optional: extra CORS origins (comma-separated). Env: APP_CORS_ALLOWED_ORIGINS
# Localhost 3000/5173 always allowed. Include both apex and www if you use both.
# app:
#   cors:
#     allowed-origins: https://yourdomain.com,https://www.yourdomain.com,https://your-app.vercel.app

# Single-user admin auth. Set ADMIN_USERNAME, ADMIN_PASSWORD_HASH (BCrypt), ADMIN_JWT_SECRET in production.
# Dev: username=admin. For password either use BCrypt hash below, or set ADMIN_PASSWORD=password (plain-text, dev only).
# Cloudinary: set CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET (or in profile)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

admin:
  auth:
    username: ${ADMIN_USERNAME:admin}
    passwordHash: ${ADMIN_PASSWORD_HASH:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
    plainPassword: ${ADMIN_PASSWORD:}
    jwtSecret: ${ADMIN_JWT_SECRET:local-jwt-signing-key-min-32-characters-long}
    jwtExpirationSeconds: ${ADMIN_JWT_EXPIRATION_SECONDS:86400}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
